var fetchOne=useCallback(function(person){
function viaFetch(){
return fetch(person.url+"?_t="+Date.now(),{redirect:"follow"})
.then(function(r){return r.json()})
.then(function(r){
if(r&&r.success&&r.data){
console.log("[FETCH OK] "+person.name+": "+r.data.length+" clients");
return r.data.map(function(c){return Object.assign({},c,{_person:person.name})});
}
console.warn("[FETCH] "+person.name+": response not valid",r);return[];
}).catch(function(e){console.warn("[FETCH FAIL] "+person.name+": "+e.message);return null});
}
function viaJSONP(){
return new Promise(function(resolve){
try{var cb="_cb_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
var u=person.url+(person.url.indexOf("?")>=0?"&":"?")+"callback="+cb+"&_t="+Date.now();
var tm=setTimeout(function(){done();console.warn("[JSONP TIMEOUT] "+person.name);resolve([])},10000);
function done(){clearTimeout(tm);delete window[cb];try{var el=document.getElementById(cb);if(el)el.parentNode.removeChild(el)}catch(x){}}
window[cb]=function(r){done();if(r&&r.success&&r.data){console.log("[JSONP OK] "+person.name+": "+r.data.length+" clients");resolve(r.data.map(function(c){return Object.assign({},c,{_person:person.name})}))}else{console.warn("[JSONP] "+person.name+": response not valid");resolve([])}};
var sc=document.createElement("script");sc.id=cb;sc.src=u;sc.onerror=function(){done();console.warn("[JSONP ERR] "+person.name);resolve([])};document.head.appendChild(sc);
}catch(x){resolve([])}
});
}
return viaFetch().then(function(result){
if(result&&result.length>0)return result;
console.log("[FALLBACK] "+person.name+": trying JSONP...");
return viaJSONP();
});
},[]);

var fetchAll=useCallback(function(silent){
if(!silent)setLoading(true);
console.log("[SYNC] Starting data fetch for "+PERSONS.length+" persons...");
var start=Date.now();
var pending=PERSONS.length;
var anySuccess=false;
PERSONS.forEach(function(p){
fetchOne(p).then(function(data){
pending--;
if(data.length>0){
anySuccess=true;
setAllData(function(prev){var next=Object.assign({},prev);next[p.name]=data;return next});
setConnected(true);setLastSync(new Date());setFetchTime(Date.now()-start);
}else{
console.warn("[SYNC] "+p.name+": no data returned");
}
if(pending===0){
if(!silent)setLoading(false);
if(!anySuccess)console.error("[SYNC] ALL fetches failed - showing fallback data");
else console.log("[SYNC] Complete in "+(Date.now()-start)+"ms");
}
})
})
},[fetchOne]);

useEffect(function(){fetchAll(false)},[]);

var rawData=useMemo(function(){if(selPerson==="ALL"){var c=[];Object.keys(allData).forEach(function(k){allData[k].forEach(function(x){c.push(x)})});return c.length>0?c:FD}var pd=allData[selPerson];return(pd&&pd.length>0)?pd:FD},[allData,selPerson]);
var processed=useMemo(function(){return rawData.map(function(c){var wd=gWD(c,wk.d);var st="on_track";if(wd.att===0)st="no_calls";else if(!wd.met)st="behind";return Object.assign({},c,{wd:wd,st:st})})},[rawData,selWeek]);

var filtered=useMemo(function(){var d=processed.slice();
if(catF!=="ALL")d=d.filter(function(x){return x.category===catF});
if(statF!=="ALL")d=d.filter(function(x){return x.st===statF});
if(callF==="CALLED")d=d.filter(function(x){return selDay>0?(x.calls[selDay]==="YES"||x.calls[selDay]==="NO"):x.wd.att>0});
if(callF==="UNCALLED")d=d.filter(function(x){return selDay>0?(!x.calls[selDay]):x.wd.att===0});
if(respF==="YES")d=d.filter(function(x){return selDay>0?x.calls[selDay]==="YES":x.wd.yes>0});
if(respF==="NO")d=d.filter(function(x){return selDay>0?x.calls[selDay]==="NO":x.wd.no>0&&x.wd.yes===0});
if(search)d=d.filter(function(x){return x.name.toLowerCase().indexOf(search.toLowerCase())>=0});
if(selDay>0&&callF==="ALL"&&respF==="ALL")d=d.filter(function(x){var v=x.calls[selDay];return v==="YES"||v==="NO"});
d.sort(function(a,b){return sortBy==="outstanding"?b.outstanding-a.outstanding:sortBy==="shortfall"?b.wd.short-a.wd.short:a.name.localeCompare(b.name)});return d
},[processed,catF,statF,callF,respF,search,sortBy,selDay]);

var stats=useMemo(function(){var t=processed.length,on=0,bh=0,nc=0,ans=0,una=0,to=0,fo=0,cc={PLATINUM:0,GOLD:0,SILVER:0};
processed.forEach(function(d){if(d.st==="on_track")on++;else if(d.st==="behind")bh++;else nc++;
if(selDay>0){if(d.calls[selDay]==="YES")ans++;else if(d.calls[selDay]==="NO")una++}else{ans+=d.wd.yes;una+=d.wd.no}

return{total:t,onTrack:on,behind:bh,noCalls:nc,ans:ans,una:una,to:to,fo:fo,cc:cc}},[processed,selDay]);

var scores=useMemo(function(){return PERSONS.map(function(p){
var pd=(allData[p.name]||[]).map(function(c){return Object.assign({},c,{wd:gWD(c,wk.d)})});
var tot=pd.length,cal=0,ans=0,otr=0,ty=0,tno=0;pd.forEach(function(c){if(c.wd.att>0)cal++;ans+=c.wd.yes;tno+=c.wd.no;if(c.wd.met&&c.wd.att>0)otr++;ty+=c.wd.yes});
var wd2=wk.d.filter(function(d){return SUN.indexOf(d)<0}).length;var tg=p.tgt*wd2;
var cp=tg>0?Math.round(ty/tg*100):0;var cv=tot>0?Math.round(cal/tot*100):0;var sp=cal>0?Math.round(ans/cal*100):0;var cm=tot>0?Math.round(otr/tot*100):0;
var sc=tg>0?Math.min(100,Math.round(ty/tg*100)):0;var fl=[];

<div style={{padding:"0 "+ps,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>{[{l:"On Track",v:stats.onTrack,c:"#27ae60",bg:"#e8f5e9",bc:"#66bb6a",f:"on_track"},{l:"Behind",v:stats.behind,c:"#e67e22",bg:"#fff8e1",bc:"#ffa726",f:"behind"},{l:"No Calls",v:stats.noCalls,c:"#e8175d",bg:"#fce4ec",bc:"#ec407a",f:"no_calls"}].map(function(s){return <button key={s.l} onClick={function(){setStatF(statF===s.f?"ALL":s.f)}} style={{padding:"12px 8px",borderRadius:14,border:statF===s.f?"2px solid "+s.c:"1px solid "+s.bc,background:statF===s.f?s.bg:"rgba(255,255,255,.85)",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span className="num" style={{fontSize:28,fontWeight:700,color:s.c,lineHeight:1}}>{s.v}</span><span style={{fontSize:11,fontWeight:800,color:s.c}}>{s.l}</span></button>})}</div>

<div style={{margin:"0 "+ps+" 10px",padding:"14px 18px",borderRadius:14,background:"rgba(255,255,255,.9)",border:"1px solid #b8c9d4"}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:10,color:"#7a8fa0",fontWeight:800,textTransform:"uppercase"}}>Total Outstanding</div><div className="num" style={{fontSize:22,fontWeight:700,color:"#1a2332",marginTop:3}}>{fmt(stats.to)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#e8175d",fontWeight:800,textTransform:"uppercase"}}>Uncalled Amount</div><div className="num" style={{fontSize:22,fontWeight:700,color:"#e8175d",marginTop:3}}>{fmt(stats.fo)}</div></div></div><div style={{marginTop:10,height:8,borderRadius:4,background:"#c5d3de",overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:"linear-gradient(90deg,#27ae60,#3c8d99)",width:stats.to>0?Math.max(5,100-stats.fo/stats.to*100)+"%":"0%",transition:"width .6s"}}/></div></div>

<div style={{margin:"10px "+ps,padding:16,borderRadius:14,background:"#fff",border:"1px solid #b8c9d4",overflow:"hidden"}}><div style={{fontSize:13,fontWeight:800,color:"#1a2332",marginBottom:12,textTransform:"uppercase"}}>{(selPerson==="ALL"?"Team Scorecard":selPerson+"\u0027s Scorecard")+" \u2014 "+wk.f}</div><div style={{overflowX:"auto"}}><table style={{width:"100%",fontSize:12.5,fontWeight:600}}><thead><tr style={{background:"#1b5b66"}}>{["Person","Clients","Called","Answered","On Track","Call %","Coverage","Score","Flags"].map(function(h){return <th key={h} style={{padding:"10px 8px",color:"#fff",fontWeight:800,fontSize:11,textTransform:"uppercase",textAlign:h==="Person"||h==="Flags"?"left":"center",whiteSpace:"nowrap"}}>{h}</th>})}</tr></thead><tbody>{scores.filter(function(p){return selPerson==="ALL"||p.name===selPerson}).map(function(p,i){var sb=p.sc>=70?"#e8f5e9":p.sc>=40?"#fff8e1":"#fce4ec";var scc=p.sc>=70?"#27ae60":p.sc>=40?"#e67e22":"#e8175d";return <tr key={p.name} style={{background:i%2===0?"#f8fafb":"#fff"}}><td style={{padding:"10px 8px",fontWeight:800,color:p.color}}>{p.name}</td><td style={{padding:"10px 8px",textAlign:"center"}}>{p.tot}</td><td style={{padding:"10px 8px",textAlign:"center",color:"#3c8d99",fontWeight:700}}>{p.cal}</td><td style={{padding:"10px 8px",textAlign:"center",color:"#27ae60",fontWeight:700}}>{p.ans}</td><td style={{padding:"10px 8px",textAlign:"center",color:p.cm>=50?"#27ae60":"#e67e22"}}>{p.otr}</td><td style={{padding:"10px 8px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:800,background:p.cp>=70?"#e8f5e9":p.cp>=40?"#fff8e1":"#fce4ec",color:p.cp>=70?"#27ae60":p.cp>=40?"#e67e22":"#e8175d"}}>{p.cp}%</span></td><td style={{padding:"10px 8px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:800,background:p.cv>=60?"#e8f5e9":p.cv>=30?"#fff8e1":"#fce4ec",color:p.cv>=60?"#27ae60":p.cv>=30?"#e67e22":"#e8175d"}}>{p.cv}%</span></td><td style={{padding:"10px 8px",textAlign:"center"}}><span className="num" style={{padding:"4px 12px",borderRadius:10,fontSize:16,fontWeight:800,background:sb,color:scc}}>{p.sc}%</span></td><td style={{padding:"10px 8px",fontSize:10}}>{p.fl.length===0?<span style={{color:"#27ae60",fontWeight:700}}>No issues</span>:p.fl.map(function(f,j){return <div key={j} style={{color:"#e8175d",fontWeight:700}}>{"\u2022 "+f}</div>})}</td></tr>})}</tbody></table></div><div style={{marginTop:10,fontSize:10,color:"#90a4ae"}}>Score = (Answered Calls / Target) x 100. Each YES counts separately, same client on multiple days = multiple counts. Target: Nitasha & Surya=40/day, Disha=50/day, Jaya=60/day.</div></div>
<div style={{padding:"10px "+ps,display:"flex",flexDirection:"column",gap:8}}><div style={{position:"relative"}}><div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Ic type="search" size={15} color="#90a4ae"/></div><input type="text" placeholder="Search client..." value={search} onChange={function(e){setSearch(e.target.value)}} style={{width:"100%",boxSizing:"border-box",padding:"11px 16px 11px 38px",borderRadius:12,border:"1px solid #dde3ea",background:"#fff",color:"#1a2332",fontSize:14,fontWeight:600,outline:"none"}}/></div>
<div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>{["ALL","PLATINUM","GOLD","SILVER"].map(function(cat){var mp={ALL:{a:"#3c8d99",i:"#e8ecf1",t:"#607d8b"},PLATINUM:{a:"#7b1fa2",i:"#f3e5f5",t:"#7b1fa2"},GOLD:{a:"#e67e22",i:"#fff3e0",t:"#e65100"},SILVER:{a:"#1565c0",i:"#e3f2fd",t:"#1565c0"}};var s=mp[cat];var ac=catF===cat;return <button key={cat} onClick={function(){setCatF(cat)}} style={{padding:"6px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:800,background:ac?s.a:s.i,color:ac?"#fff":s.t}}>{cat}{cat!=="ALL"?" ("+(stats.cc[cat]||0)+")":""}</button>})}<select value={sortBy} onChange={function(e){setSortBy(e.target.value)}} style={{marginLeft:"auto",padding:"6px 12px",borderRadius:10,border:"1px solid #cdd8e0",background:"#fff",color:"#546e7a",fontSize:12,fontWeight:700}}><option value="outstanding">Sort: Amount</option><option value="shortfall">Sort: Shortfall</option><option value="name">Sort: Name</option></select></div></div>

<div style={{padding:"6px "+ps+" 8px",fontSize:12,color:"#7a8fa0",fontWeight:700}}>Showing {filtered.length} of {processed.length} clients{selPerson!=="ALL"&&<span style={{marginLeft:6,color:"#3c8d99"}}>| {selPerson}</span>}</div>

<div style={{padding:"0 "+ps+" 50px"}}><div style={{background:"#fff",borderRadius:14,border:"1px solid #b8c9d4",overflow:"hidden"}}><div style={{overflowX:"auto"}}><table style={{width:"100%",fontSize:12.5,fontWeight:600}}><thead><tr style={{background:"#1b5b66"}}><th style={{padding:"12px 10px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"left",whiteSpace:"nowrap",position:"sticky",left:0,background:"#1b5b66",zIndex:2}}>Client Name</th>{selPerson==="ALL"&&<th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"center"}}>Person</th>}<th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"center"}}>Category</th><th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"right"}}>Outstanding</th><th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"center"}}>Overdue</th><th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"center"}}>Frequency</th><th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"center"}}>Calls</th><th style={{padding:"12px 8px",color:"#fff",fontWeight:800,fontSize:11,textAlign:"center"}}>Status</th>{wk.d.map(function(d){return <th key={d} style={{padding:"12px 6px",color:SUN.indexOf(d)>=0?"#f8bbd0":"#fff",fontWeight:800,fontSize:11,textAlign:"center",minWidth:28,background:SUN.indexOf(d)>=0?"#153d45":"#1b5b66"}}>{d}</th>})}</tr></thead><tbody>{filtered.map(function(cl,i){var wd=cl.wd;var bc=cl.st==="no_calls"?"#e8175d":cl.st==="behind"?"#e67e22":"#27ae60";return <tr key={i} style={{background:i%2===0?"#f8fafb":"#fff"}}><td style={{padding:"10px 10px",fontWeight:700,color:"#0f1a2a",whiteSpace:"nowrap",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",borderLeft:"3px solid "+bc,position:"sticky",left:0,background:"inherit",zIndex:1}}>{cl.name}</td>{selPerson==="ALL"&&<td style={{padding:"10px 8px",textAlign:"center"}}>{cl._person&&<span style={{padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,background:(PERSONS.find(function(p){return p.name===cl._person})||{color:"#546e7a"}).color,color:"#fff"}}>{cl._person}</span>}</td>}<td style={{padding:"10px 8px",textAlign:"center"}}><CP v={cl.category}/></td><td style={{padding:"10px 8px",textAlign:"right"}}><span className="num" style={{fontSize:13,fontWeight:700,color:cl.outstanding>50000?"#e8175d":"#1a2332"}}>{fmt(cl.outstanding)}</span></td><td style={{padding:"10px 8px",textAlign:"center"}}><DP v={cl.outstandingDays}/></td><td style={{padding:"10px 8px",textAlign:"center"}}><FP v={cl.frequency}/></td><td style={{padding:"10px 8px",textAlign:"center"}}><span className="num" style={{fontSize:13}}><span style={{color:"#27ae60"}}>{wd.yes}</span><span style={{color:"#ccc"}}>/</span><span style={{color:"#1a2332"}}>{wd.req}</span></span></td><td style={{padding:"10px 8px",textAlign:"center"}}><SB met={wd.met} short={wd.short} att={wd.att}/></td>{wk.d.map(function(d){var v=cl.calls[d];var bg=v==="YES"?"#c8e6c9":v==="NO"?"#ffcdd2":SUN.indexOf(d)>=0?"#f3f3f3":"#fafafa";var co=v==="YES"?"#1b5e20":v==="NO"?"#b71c1c":"#ddd";return <td key={d} style={{padding:"6px 4px",textAlign:"center",fontSize:13,fontWeight:800,color:co,background:bg,minWidth:28}}>{v==="YES"?"\u2713":v==="NO"?"\u2717":"\u2022"}</td>})}</tr>})}</tbody></table></div>{filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"#90a4ae"}}>No clients match filters</div>}</div></div>
</div>
}
