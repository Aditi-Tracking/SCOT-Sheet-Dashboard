.sb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px}

.sb-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.35)}
.sb-btn .sb-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
.sb-btn .sb-count{margin-left:auto;font-size:11px;background:rgba(255,255,255,.12);padding:2px 8px;border-radius:12px;font-weight:700}
.sb-divider{height:1px;background:rgba(255,255,255,.06);margin:8px 14px}
.sb-mini-btn{padding:6px 10px;margin:2px 0;background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);border:none;border-radius:6px;font-size:11px;font-weight:600;text-align:center;flex:1;transition:all .15s}
.sb-mini-btn:hover{background:rgba(255,255,255,.08);color:#fff}

.section-hdr h1{font-size:26px;font-weight:700;color:#1a1f36;margin-bottom:4px}
.section-hdr p{color:#6b7280;font-size:13px;margin-bottom:24px}

.card-grid{display:grid;gap:16px;margin-bottom:24px}
.kcard{background:#fff;padding:22px 24px;border-radius:16px;border:1px solid rgba(0,0,0,.04);position:relative;overflow:hidden;transition:all .2s}

.kcard-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kcard-val{font-size:28px;font-weight:700;color:#1a1f36}
.kcard-sub{font-size:11px;color:#10b981;margin-top:4px;font-weight:500}

.card-white{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,.05);padding:20px 24px;margin-bottom:20px}
.card-white h3{font-size:15px;font-weight:700;color:#1a1f36;margin-bottom:14px}

.progress-bar{height:8px;border-radius:20px;background:#e5e7eb;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width .6s}

.stat-btn.active{border-color:#667eea;background:#eef2ff;box-shadow:0 2px 8px rgba(102,126,234,.15)}

.tbl-scroll{overflow-x:auto}
.tbl{width:100%;min-width:max-content;font-size:13px}
.tbl thead{background:#f9fafb}
.tbl th{padding:12px 14px;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.3px;text-align:left;border-bottom:2px solid #e5e7eb;white-space:nowrap}
.tbl td{padding:12px 14px;font-size:13px;color:#374151;border-bottom:1px solid #f3f4f6}
.tbl tbody tr:hover{background:#f9fafb}
.tbl tbody tr:last-child td{border-bottom:none}

.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.refresh-btn{background:#1f2937;color:#fff;border:none;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:.2s}
.refresh-btn:hover{background:#111827}
.search-input{width:100%;padding:10px 14px 10px 36px;border-radius:12px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:500;outline:none;transition:all .2s}
.search-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.cat-btn{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:700;transition:all .15s}
.cat-btn:hover{transform:translateY(-1px)}

@media(max-width:768px){
.container{flex-direction:column}
.sidebar{width:100%;max-height:none;overflow:visible}
.main{padding:16px}
.card-grid{grid-template-columns:1fr 1fr !important}
}

.loc-slicer{display:flex;gap:6px;margin-top:8px;margin-bottom:16px}
.loc-slicer-btn{padding:7px 18px;border-radius:20px;border:1.5px solid #e5e7eb;font-size:12px;font-weight:700;background:#fff;color:#6b7280;transition:all .15s}
.loc-slicer-btn:hover{border-color:#f43f5e;color:#f43f5e;background:#fef2f2}
.loc-slicer-btn.active{background:#f43f5e;color:#fff;border-color:#f43f5e;box-shadow:0 2px 8px rgba(244,63,94,.25)}
</style>

var scores=useMemo(function(){var scoreDays=selDay>0?[selDay]:wk.d;var isSun=selDay>0&&SUN.indexOf(selDay)>=0;return PERSONS.map(function(p){var pd=(allData[p.name]||[]).map(function(c){var norm=normClient(Object.assign({},c,{_person:p.name}));var wd;if(selDay>0){var v=norm.calls[selDay];var y=v==="YES"?1:0;var n=v==="NO"?1:0;var att=y+n;wd={req:1,yes:y,no:n,att:att,met:att>=1,short:Math.max(0,1-att)}}else{wd=gWD(norm,scoreDays)}return Object.assign({},norm,{wd:wd})});var tot=pd.length,cal=0,ans=0,otr=0,ty=0;pd.forEach(function(c){var wasCalled=c.wd.att>0;if(wasCalled)cal++;ans+=c.wd.yes;if(c.wd.met&&wasCalled)otr++;ty+=c.wd.att});var wd2=selDay>0?(isSun?0:1):scoreDays.filter(function(d){return SUN.indexOf(d)<0}).length;var tg=p.tgt*wd2;var cp=tg>0?Math.round(ty/tg*100):0;var cv=tot>0?Math.round(cal/tot*100):0;var cm=tot>0?Math.round(otr/tot*100):0;var sc=tg>0?Math.min(100,Math.round(ty/tg*100)):0;var fl=[];if(isSun){fl.push("Sunday")}else{if(sc<25)fl.push("Critical");else if(sc<50)fl.push("Below 50%");if(cv<40)fl.push("Low coverage")}return{name:p.name,color:p.color,tgt:p.tgt,tot:tot,cal:cal,ans:ans,otr:otr,cp:cp,cv:cv,cm:cm,sc:sc,fl:fl,tg:tg}})},[allData,selWeek,selDay]);

/* ====== RENDER ====== */
var teamScore=(function(){if(selPerson==="ALL"){var t=0;scores.forEach(function(s){t+=s.sc});return scores.length?Math.round(t/scores.length):0}var f=scores.find(function(s){return s.name===selPerson});return f?f.sc:0})();
var scoreColor=teamScore>=70?"#16a34a":teamScore>=40?"#d97706":"#dc2626";
var pct=tgtC>0?Math.round(called/tgtC*100):0;

return <div className="container">

<div className="sidebar">
<div className="sb-header">
<div className="sb-logo">📊 Collection Calling Tracker</div>
<div className="sb-sub">March 2026</div>
</div>

<div className="sb-section">
<div className="sb-label">Team Members</div>
<button className={"sb-btn"+(selPerson==="ALL"?" active":"")} onClick={function(){setSelPerson("ALL");setJayaSheet("ALL")}}>
<span className="sb-icon">👥</span>All Team
<span className="sb-count">{rawData.length||"..."}</span>
</button>
{PERSONS.map(function(p){var ct=(allData[p.name]||[]).length;var ac=selPerson===p.name;return <button key={p.name} className={"sb-btn"+(ac?" active":"")} onClick={function(){if(ac){setSelPerson("ALL");setJayaSheet("ALL")}else{setSelPerson(p.name);if(p.name!=="Jaya")setJayaSheet("ALL")}}} style={ac?{background:"linear-gradient(135deg,"+p.color+","+p.color+"cc)"}:{}}>
<span className="sb-icon" style={{color:ac?"#fff":p.color}}>●</span>{p.name}
<span className="sb-count">{ct||"..."}</span>
</button>})}
</div>

<div className="sb-divider"/>
<div className="sb-section">
<div className="sb-label">Period</div>
<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
{WEEKS.map(function(w,i){return <button key={i} className={"sb-mini-btn"+(selWeek===i?" active":"")} onClick={function(){setSelWeek(i);setSelDay(0)}} style={{flex:"1 1 auto",minWidth:36}}>{w.l}</button>})}
</div>
<div style={{marginTop:8}}>
<div className="sb-label" style={{marginBottom:6}}>Day Filter</div>
<div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
<button className={"sb-mini-btn"+(selDay===0?" active":"")} onClick={function(){setSelDay(0)}} style={{minWidth:32}}>All</button>
{wk.d.map(function(d){var isSun=SUN.indexOf(d)>=0;return <button key={d} className={"sb-mini-btn"+(selDay===d?" active":"")+(isSun?" sun":"")} onClick={function(){setSelDay(selDay===d?0:d)}} style={{minWidth:24}}>{d}</button>})}
</div>
</div>
</div>

<div className="sb-divider"/>
<div className="sb-section">
{!isToday&&<button className="sb-btn" onClick={goToday} style={{background:"rgba(102,126,234,.15)",color:"#a5b4fc",border:"none"}}><span className="sb-icon">📅</span>Go to Today</button>}
<button className="sb-btn" onClick={function(){if(!refreshing)fetchAll(false)}} style={{background:refreshing?"rgba(102,126,234,.2)":"rgba(255,255,255,.04)"}}>
<span className="sb-icon" style={{display:"inline-flex",animation:refreshing?"spin .8s linear infinite":"none"}}>🔄</span>{refreshing?"Syncing...":"Refresh Data"}
</button>
</div>

<div className="sb-status">
<div style={{display:"flex",alignItems:"center",gap:6}}>
<span style={{width:8,height:8,borderRadius:"50%",background:connected?"#4ade80":"#94a3b8",animation:connected?"pulse 2s infinite":"none"}}/>
<span style={{fontSize:11,color:connected?"#4ade80":"#94a3b8",fontWeight:600}}>{connected?"LIVE":loading?"SYNCING...":"OFFLINE"}</span>
</div>
</div>
</div>

<div className="main">
<div className="section-hdr">
<h1>{selPerson==="ALL"?"Dashboard Overview":selPerson+"'s Dashboard"}</h1>
{selPerson==="Jaya"&&<div className="loc-slicer">
<button className={"loc-slicer-btn"+(jayaSheet==="ALL"?" active":"")} onClick={function(){setJayaSheet("ALL")}}>All ({jayaCounts.total})</button>
<button className={"loc-slicer-btn"+(jayaSheet==="HeadOffice"?" active":"")} onClick={function(){setJayaSheet("HeadOffice")}}>Head Office ({jayaCounts.ho})</button>
<button className={"loc-slicer-btn"+(jayaSheet==="Bangalore"?" active":"")} onClick={function(){setJayaSheet("Bangalore")}}>Bangalore ({jayaCounts.bl})</button>
</div>}
<p>{selDay>0?"March "+selDay+", 2026":(isToday?"Today — ":"")+wk.f+", March 2026"}{isSunday?" (Sunday — No calls)":""}</p>
</div>

<div className="card-grid" style={{gridTemplateColumns:"repeat(5,1fr)"}}>
<div className="kcard" style={{borderTop:"4px solid "+scoreColor}}><div className="kcard-label">Score</div><div className="kcard-val num" style={{color:scoreColor}}>{teamScore}%</div><div className="kcard-sub" style={{color:"#6b7280"}}>{stats.totalAttempts} calls of {tgtC}</div></div>
<div className="kcard" style={{borderTop:"4px solid #dc2626"}}><div className="kcard-label">Total Outstanding</div><div className="kcard-val num">{fmtS(stats.to)}</div><div className="kcard-sub" style={{color:"#dc2626"}}>All clients</div></div>
<div className="kcard" style={{borderTop:"4px solid #6b7280"}}><div className="kcard-label">{selDay>0?"Target (Day "+selDay+")":"Target ("+wk.l+")"}</div><div className="kcard-val num">{tgtC}</div><div className="kcard-sub" style={{color:"#6b7280"}}>Daily: {dailyTgt}</div></div>
<div className="kcard" onClick={function(){setCallF(callF==="CALLED"?"ALL":"CALLED")}} style={{borderTop:"4px solid #16a34a",cursor:"pointer",outline:callF==="CALLED"?"2px solid #16a34a":"none"}}><div className="kcard-label">Total Calls</div><div className="kcard-val num" style={{color:"#16a34a"}}>{called}</div><div className="kcard-sub">{stats.ans} answered, {stats.una} missed</div></div>
<div className="kcard" onClick={function(){setCallF(callF==="UNCALLED"?"ALL":"UNCALLED")}} style={{borderTop:"4px solid #f59e0b",cursor:"pointer",outline:callF==="UNCALLED"?"2px solid #f59e0b":"none"}}><div className="kcard-label">Pending</div><div className="kcard-val num" style={{color:"#f59e0b"}}>{Math.max(0,tgtC-called)}</div><div className="kcard-sub" style={{color:"#6b7280"}}>{called} of {tgtC} done</div></div>
</div>

<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
<button onClick={function(){setRespF(respF==="YES"?"ALL":"YES")}} style={{padding:"16px 20px",borderRadius:14,border:respF==="YES"?"2px solid #16a34a":"1px solid #d1fae5",background:respF==="YES"?"#f0fdf4":"#fff",display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:12,background:"#16a34a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,flexShrink:0}}>✓</div><div style={{textAlign:"left"}}><div className="num" style={{fontSize:28,color:"#16a34a",lineHeight:1}}>{stats.ans}</div><div style={{fontSize:13,fontWeight:600,color:"#15803d",marginTop:3}}>Answered</div></div></button>
<button onClick={function(){setRespF(respF==="NO"?"ALL":"NO")}} style={{padding:"16px 20px",borderRadius:14,border:respF==="NO"?"2px solid #dc2626":"1px solid #fecaca",background:respF==="NO"?"#fef2f2":"#fff",display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:12,background:"#dc2626",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:18,flexShrink:0}}>✗</div><div style={{textAlign:"left"}}><div className="num" style={{fontSize:28,color:"#dc2626",lineHeight:1}}>{stats.una}</div><div style={{fontSize:13,fontWeight:600,color:"#991b1b",marginTop:3}}>Not Answered</div></div></button>
</div>

<div className="card-white">
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
<span style={{fontSize:13,color:"#6b7280",fontWeight:600}}>{selDay>0?"March "+selDay:wk.f}{isToday?" (Today)":""}</span>
<span className="num" style={{fontSize:14,color:pct>=100?"#16a34a":"#667eea"}}>{called} / {tgtC} calls</span>
</div>
<div className="progress-bar"><div className="progress-fill" style={{width:Math.min(100,pct)+"%",background:pct>=100?"#16a34a":"linear-gradient(90deg,#667eea,#764ba2)"}}/></div>
</div>

<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
{[{l:"On Track",v:stats.onTrack,c:"#16a34a",f:"on_track"},{l:"Behind",v:stats.behind,c:"#d97706",f:"behind"},{l:"No Calls",v:stats.noCalls,c:"#dc2626",f:"no_calls"}].map(function(s){return <button key={s.l} className={"stat-btn"+(statF===s.f?" active":"")} onClick={function(){setStatF(statF===s.f?"ALL":s.f)}}><span className="num" style={{fontSize:28,color:s.c,lineHeight:1}}>{s.v}</span><span style={{fontSize:12,fontWeight:700,color:s.c}}>{s.l}</span></button>})}
</div>

<div className="card-white">
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20}}>
<div><div style={{fontSize:10,color:"#6b7280",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Total Outstanding</div><div className="num" style={{fontSize:20,color:"#1a1f36",marginTop:4}}>{fmt(stats.to)}</div></div>
<div><div style={{fontSize:10,color:"#16a34a",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Called Outstanding</div><div className="num" style={{fontSize:20,color:"#16a34a",marginTop:4}}>{fmt(stats.calledOut)}</div></div>
<div><div style={{fontSize:10,color:"#dc2626",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Uncalled Outstanding</div><div className="num" style={{fontSize:20,color:"#dc2626",marginTop:4}}>{fmt(stats.uncalledOut)}</div></div>
</div>
<div className="progress-bar" style={{marginTop:12}}><div className="progress-fill" style={{width:stats.to>0?Math.max(3,Math.round(stats.calledOut/stats.to*100))+"%":"0%",background:"#16a34a"}}/></div>
</div>

<div className="tbl-wrap" style={{marginBottom:24}}>
<div className="tbl-hdr"><h3>{(selPerson==="ALL"?"Team Scorecard":selPerson+"'s Scorecard")+" — "+(selDay>0?"March "+selDay:wk.f)}</h3></div>
<div className="tbl-scroll"><table className="tbl">
<thead><tr>{["Person","Clients","Target","Called","Answered","On Track","Call %","Coverage","Score","Flags"].map(function(h){return <th key={h} style={{textAlign:h==="Person"||h==="Flags"?"left":"center"}}>{h}</th>})}</tr></thead>
<tbody>{scores.filter(function(p){return selPerson==="ALL"||p.name===selPerson}).map(function(p,i){var sb=p.sc>=70?"#f0fdf4":p.sc>=40?"#fffbeb":"#fef2f2";var scc=p.sc>=70?"#16a34a":p.sc>=40?"#d97706":"#dc2626";return <tr key={p.name}>
<td style={{fontWeight:700,color:p.color}}>{p.name}</td>
<td style={{textAlign:"center"}}>{p.tot}</td>
<td style={{textAlign:"center"}}><span className="num" style={{color:"#6b7280"}}>{p.tg}</span></td>
<td style={{textAlign:"center",color:"#667eea",fontWeight:600}}>{p.cal}</td>
<td style={{textAlign:"center",color:"#16a34a",fontWeight:600}}>{p.ans}</td>
<td style={{textAlign:"center",color:p.cm>=50?"#16a34a":"#d97706"}}>{p.otr}</td>
<td style={{textAlign:"center"}}><span className="pill" style={{background:p.cp>=70?"#f0fdf4":p.cp>=40?"#fffbeb":"#fef2f2",color:p.cp>=70?"#16a34a":p.cp>=40?"#d97706":"#dc2626"}}>{p.cp}%</span></td>
<td style={{textAlign:"center"}}><span className="pill" style={{background:p.cv>=60?"#f0fdf4":p.cv>=30?"#fffbeb":"#fef2f2",color:p.cv>=60?"#16a34a":p.cv>=30?"#d97706":"#dc2626"}}>{p.cv}%</span></td>
<td style={{textAlign:"center"}}><span className="num pill" style={{background:sb,color:scc,fontSize:14,padding:"4px 14px"}}>{p.sc}%</span></td>
<td style={{fontSize:11}}>{p.fl.length===0?<span style={{color:"#16a34a",fontWeight:600}}>No issues</span>:p.fl.map(function(f,j){return <div key={j} style={{color:"#dc2626",fontWeight:600}}>{"\u2022 "+f}</div>})}</td>
</tr>})}</tbody></table></div>
<div style={{padding:"10px 24px",fontSize:11,color:"#9ca3af",borderTop:"1px solid #f3f4f6"}}>Score = Total Calls / Target × 100. Calls = YES + NO. Target: Nitasha & Surya=40/day, Disha=50/day, Jaya=60/day.</div>
</div>

<div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>
<div style={{position:"relative",flex:1,minWidth:200}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9ca3af"}}>🔍</span><input className="search-input" type="text" placeholder="Search client..." value={search} onChange={function(e){setSearch(e.target.value)}}/></div>
{["ALL","PLATINUM","GOLD","SILVER"].map(function(cat){var mp={ALL:{a:"#667eea",i:"#f3f4f6",t:"#6b7280"},PLATINUM:{a:"#7c3aed",i:"#f5f3ff",t:"#7c3aed"},GOLD:{a:"#d97706",i:"#fffbeb",t:"#d97706"},SILVER:{a:"#2563eb",i:"#eff6ff",t:"#2563eb"}};var s=mp[cat];var ac=catF===cat;return <button key={cat} className="cat-btn" onClick={function(){setCatF(cat)}} style={{background:ac?s.a:s.i,color:ac?"#fff":s.t}}>{cat}{cat!=="ALL"?" ("+(stats.cc[cat]||0)+")":""}</button>})}
<select value={sortBy} onChange={function(e){setSortBy(e.target.value)}} style={{padding:"8px 12px",borderRadius:10,border:"1.5px solid #e5e7eb",background:"#fff",color:"#374151",fontSize:12,fontWeight:600}}><option value="outstanding">Sort: Amount</option><option value="shortfall">Sort: Shortfall</option><option value="name">Sort: Name</option></select>
</div>

<div style={{fontSize:12,color:"#9ca3af",fontWeight:600,marginBottom:8}}>Showing {filtered.length} of {processed.length} clients{selPerson!=="ALL"&&<span style={{color:"#667eea"}}> | {selPerson}</span>}</div>

<div className="tbl-wrap">
<div className="tbl-scroll"><table className="tbl">
<thead><tr>
<th style={{position:"sticky",left:0,background:"#f9fafb",zIndex:2}}>Client Name</th>
{selPerson==="ALL"&&<th>Person</th>}
{selPerson==="Jaya"&&jayaSheet==="ALL"&&<th>Sheet</th>}
<th>Category</th><th style={{textAlign:"right"}}>Outstanding</th><th>Overdue</th><th>Frequency</th><th style={{textAlign:"center"}}>Calls</th><th>Status</th>
{wk.d.map(function(d){return <th key={d} style={{textAlign:"center",minWidth:28,color:SUN.indexOf(d)>=0?"#d4d4d8":"#6b7280",background:SUN.indexOf(d)>=0?"#fafafa":"#f9fafb"}}>{d}</th>})}
</tr></thead>
<tbody>{filtered.map(function(cl,i){var wa=cl.wdActive;var bc=cl.st==="no_calls"?"#dc2626":cl.st==="behind"?"#d97706":"#16a34a";return <tr key={i}>
<td style={{fontWeight:600,color:"#111827",whiteSpace:"nowrap",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",borderLeft:"3px solid "+bc,position:"sticky",left:0,background:i%2===0?"#fff":"#fafafa",zIndex:1}}>{cl.name}</td>
{selPerson==="ALL"&&<td>{cl._person&&<span className="pill" style={{background:(PERSONS.find(function(p){return p.name===cl._person})||{color:"#667eea"}).color,color:"#fff",fontSize:10}}>{cl._person}</span>}</td>}
{selPerson==="Jaya"&&jayaSheet==="ALL"&&<td><SSP v={cl._sheetSource}/></td>}
<td><CP v={cl.category}/></td>
<td style={{textAlign:"right"}}><span className="num" style={{color:cl.outstanding>50000?"#dc2626":"#374151",fontSize:13}}>{fmt(cl.outstanding)}</span></td>
<td><DP v={cl.outstandingDays}/></td>
<td><FP v={cl.frequency}/></td>
<td style={{textAlign:"center"}}><span className="num" style={{fontSize:13}}><span style={{color:wa.att>=wa.req?"#16a34a":"#d97706"}}>{wa.att}</span><span style={{color:"#d4d4d8"}}>/</span>{wa.req}</span></td>
<td><SB met={wa.met} short={wa.short} att={wa.att}/></td>
{wk.d.map(function(d){var v=cl.calls[d];var bg=v==="YES"?"#dcfce7":v==="NO"?"#fee2e2":SUN.indexOf(d)>=0?"#fafafa":"#fff";var co=v==="YES"?"#166534":v==="NO"?"#991b1b":"#e5e7eb";return <td key={d} style={{textAlign:"center",fontSize:13,fontWeight:700,color:co,background:bg,minWidth:28}}>{v==="YES"?"\u2713":v==="NO"?"\u2717":"\u2022"}</td>})}
</tr>})}</tbody></table></div>
{filtered.length===0&&<div style={{padding:50,textAlign:"center",color:"#9ca3af"}}><div style={{fontSize:40,marginBottom:8}}>{isSunday?"\u2600":"\uD83D\uDCCB"}</div><div style={{fontSize:15,fontWeight:600,color:"#6b7280"}}>{isSunday?"Sunday \u2014 No calls scheduled":loading?"Loading data from Google Sheets...":rawData.length===0?(connected?"No data for "+(selPerson==="ALL"?"any member":selPerson):"Connecting..."):"No clients match filters"}</div></div>}
</div>

</div>
</div>
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
