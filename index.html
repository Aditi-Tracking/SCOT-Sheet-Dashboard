const R = "\u20B9";

function getWD(c, days) {
  const req = FM[c.frequency] || 3;
  let y=0, n=0, t=0;
  days.forEach(d => { const v=c.calls[d]; if(v==="YES"){y++;t++} else if(v==="NO"){n++;t++} });
  return { required:req, yesCalls:y, noCalls:n, totalAttempts:t, met:y>=req, shortfall:Math.max(0,req-y) };
}

const fmt = n => { if(n===0)return R+"0"; if(n<0)return "-"+R+Math.abs(n).toLocaleString("en-IN"); return R+n.toLocaleString("en-IN",{maximumFractionDigits:0}); };
const fmtS = n => { if(n>=10000000)return R+(n/10000000).toFixed(1)+"Cr"; if(n>=100000)return R+(n/100000).toFixed(1)+"L"; if(n>=1000)return R+(n/1000).toFixed(1)+"K"; return fmt(n); };

function useWidth(){const[w,s]=useState(window.innerWidth);useEffect(()=>{const h=()=>s(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);return w}

if(type==="users")return <svg style={s} viewBox="0 0 24 24" {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;

return null};

const SB=({met,shortfall,totalAttempts})=>{const c=totalAttempts===0?{bg:T.pinkLight,color:T.pink,border:"#f8bbd0",label:"NO CALLS",dot:T.pink}:met?{bg:T.greenLight,color:T.green,border:"#a5d6a7",label:"ON TRACK",dot:T.green}:{bg:T.yellowLight,color:T.orange,border:"#ffe082",label:"SHORT BY "+shortfall,dot:T.orange};return<span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:c.bg,color:c.color,border:"1.5px solid "+c.border}}><span style={{width:7,height:7,borderRadius:"50%",background:c.dot,display:"inline-block"}}/>{c.label}</span>};

function App(){

  const week=WEEKS[selectedWeek];const timerRef=useRef(null);

  const fetchData=useCallback(async(url,silent)=>{
    if(!url){setSyncError("Please paste an Apps Script Web App URL");return}
    if(!silent)setLoading(true);setSyncError("");const start=Date.now();
    try{
      const cbName="_cb_"+Date.now();
      const jUrl=url+(url.includes("?")?"&":"?")+"callback="+cbName;
      const result=await new Promise((resolve,reject)=>{
        const timeout=setTimeout(()=>{reject(new Error("Timed out after 15s"));cleanup()},15000);
        const cleanup=()=>{clearTimeout(timeout);delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script)};
        window[cbName]=(data)=>{cleanup();resolve(data)};
        const script=document.createElement("script");
        script.src=jUrl;
        script.onerror=()=>{cleanup();fetch(url).then(r=>r.json()).then(resolve).catch(reject)};
        document.head.appendChild(script);
      });
      if(result&&result.success&&Array.isArray(result.data)&&result.data.length>0){
        setRawData(result.data);setConnected(true);setLastSync(new Date());setFetchTime(Date.now()-start);
      }else{throw new Error("Invalid response: "+(result.count||0)+" rows")}
    }catch(e){if(!silent)setSyncError(e.message||"Failed to fetch")}
    if(!silent)setLoading(false);
  },[]);

  useEffect(()=>{if(!connected||!apiUrl)return;if(timerRef.current)clearInterval(timerRef.current);timerRef.current=setInterval(()=>fetchData(apiUrl,true),refreshInterval*1000);return()=>{if(timerRef.current)clearInterval(timerRef.current)}},[connected,apiUrl,refreshInterval,fetchData]);

  const processedData=useMemo(()=>rawData.map(c=>{const wd=getWD(c,week.days);let status="on_track";if(wd.totalAttempts===0)status="no_calls";else if(!wd.met)status="behind";return{...c,weekData:wd,status}}),[rawData,selectedWeek]);
  const filtered=useMemo(()=>{let d=[...processedData];if(categoryFilter!=="ALL")d=d.filter(x=>x.category===categoryFilter);if(statusFilter!=="ALL")d=d.filter(x=>x.status===statusFilter);if(searchTerm)d=d.filter(x=>x.name.toLowerCase().includes(searchTerm.toLowerCase()));d.sort((a,b)=>sortBy==="outstanding"?b.outstanding-a.outstanding:sortBy==="shortfall"?b.weekData.shortfall-a.weekData.shortfall:a.name.localeCompare(b.name));return d},[processedData,categoryFilter,statusFilter,searchTerm,sortBy]);
  const stats=useMemo(()=>{const t=processedData.length;const on=processedData.filter(d=>d.status==="on_track").length;const bh=processedData.filter(d=>d.status==="behind").length;const nc=processedData.filter(d=>d.status==="no_calls").length;const to=processedData.reduce((s,d)=>s+Math.max(0,d.outstanding),0);const fo=processedData.filter(d=>d.status==="no_calls").reduce((s,d)=>s+Math.max(0,d.outstanding),0);const cr=t>0?Math.round((on/t)*100):0;const cc={PLATINUM:0,GOLD:0,SILVER:0};processedData.forEach(d=>{if(cc[d.category]!==undefined)cc[d.category]++});return{total:t,onTrack:on,behind:bh,noCalls:nc,totalOutstanding:to,flaggedOutstanding:fo,complianceRate:cr,catCounts:cc}},[processedData]);

            <span style={{color:"#fff",fontSize:10,fontWeight:700}}>{connected?"LIVE":"CONNECT"}</span>
          </button>
          <div style={{width:48,height:48,borderRadius:12,background:"rgba(255,255,255,.15)",border:"2px solid rgba(255,255,255,.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:17,fontWeight:900,color:"#fff"}}>{stats.complianceRate}%</span>
          </div>
        </div>
      </div>

      {showSetup&&<div style={{background:"rgba(0,0,0,.25)",borderRadius:12,padding:14,marginBottom:10,backdropFilter:"blur(8px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><Ic type="zap" size={14} color={T.yellow}/><span style={{fontSize:13,fontWeight:800,color:"#fff"}}>Apps Script API Connection</span></div>
        <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:10,marginBottom:10,fontSize:11,color:"rgba(255,255,255,.7)",lineHeight:1.6}}>
          <div style={{fontWeight:700,color:T.yellow,marginBottom:4}}>Setup steps:</div>
          <div>1. Open Google Sheet &rarr; Extensions &rarr; Apps Script</div>
          <div>2. Paste the provided script code</div>
          <div>3. Deploy &rarr; New deployment &rarr; Web app</div>
          <div>4. Execute as: <b style={{color:"#fff"}}>Me</b> | Access: <b style={{color:"#fff"}}>Anyone</b></div>
          <div>5. Copy the Web App URL and paste below</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <input type="text" placeholder="Paste Apps Script Web App URL..." value={apiUrl} onChange={e=>{setApiUrl(e.target.value);setSyncError("")}} style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1.5px solid rgba(255,255,255,.25)",background:"rgba(255,255,255,.12)",color:"#fff",fontSize:12,outline:"none",minWidth:0}}/>
          <button onClick={()=>fetchData(apiUrl,false)} disabled={loading} style={{padding:"9px 18px",borderRadius:8,border:"none",background:T.yellow,color:T.tealDeep,fontWeight:800,fontSize:12,cursor:loading?"wait":"pointer",whiteSpace:"nowrap",opacity:loading?.7:1}}>{loading?"Syncing...":"Connect"}</button>
        </div>
        {syncError&&<div style={{color:"#ffab91",fontSize:11,marginTop:8,fontWeight:600,lineHeight:1.4,background:"rgba(255,87,34,.15)",padding:"6px 10px",borderRadius:6}}>{syncError}</div>}
        {connected&&<div style={{marginTop:10}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:"50%",background:"#2ecc71",display:"inline-block"}}/><span style={{color:"#a5d6a7",fontSize:11,fontWeight:700}}>Connected</span>{fetchTime&&<span style={{color:"rgba(255,255,255,.4)",fontSize:10}}>({fetchTime}ms)</span>}</div>
            <button onClick={()=>fetchData(apiUrl,false)} style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:6,padding:"4px 8px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}><Ic type="refresh" size={12} color="#fff"/><span style={{color:"#fff",fontSize:10,fontWeight:600}}>Refresh</span></button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
            <span style={{color:"rgba(255,255,255,.5)",fontSize:10}}>Auto-refresh:</span>
            {[15,30,60].map(s=><button key={s} onClick={()=>setRefreshInterval(s)} style={{padding:"2px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,background:refreshInterval===s?T.yellow:"rgba(255,255,255,.1)",color:refreshInterval===s?T.tealDeep:"rgba(255,255,255,.6)"}}>{s}s</button>)}
          </div>
          {lastSync&&<div style={{color:"rgba(255,255,255,.4)",fontSize:9,marginTop:4}}>Last synced: {lastSync.toLocaleTimeString()}</div>}
        </div>}
      </div>}

      <div style={{display:"flex",gap:3}}>
        {WEEKS.map((w,i)=><button key={i} onClick={()=>setSelectedWeek(i)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:isMobile?11:12,fontWeight:700,background:selectedWeek===i?T.yellow:"rgba(255,255,255,.12)",color:selectedWeek===i?T.tealDeep:"rgba(255,255,255,.75)",transition:"all .2s"}}>{isMobile?w.label:w.full}</button>)}
      </div>
    </div>

    {/* KPIs */}
    <div style={{padding:isDesktop?"14px 24px":"12px 14px",display:"grid",gridTemplateColumns:isDesktop?"1fr 1fr 1fr 1fr":"1fr 1fr",gap:8}}>
      <KG value={stats.total} label="Total Clients" icon="users" color={T.teal}/>
      <KG value={fmtS(stats.totalOutstanding)} label="Total Outst." icon="rupee" color={T.pink}/>
      <KG value={stats.onTrack} label="On Track" icon="check" color={T.green}/>
      <KG value={stats.noCalls} label="No Calls" icon="alert" color={T.orange}/>
    </div>

    {/* STATUS CARDS */}
    <div style={{padding:pad,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:4}}>
      {[{l:"On Track",v:stats.onTrack,c:T.green,bg:T.greenLight,bc:"#a5d6a7",f:"on_track"},{l:"Behind",v:stats.behind,c:T.orange,bg:T.yellowLight,bc:"#ffe082",f:"behind"},{l:"No Calls",v:stats.noCalls,c:T.pink,bg:T.pinkLight,bc:"#f8bbd0",f:"no_calls"}].map(s=>
        <button key={s.l} onClick={()=>setStatusFilter(statusFilter===s.f?"ALL":s.f)} style={{padding:"10px 6px",borderRadius:12,cursor:"pointer",border:statusFilter===s.f?"2.5px solid "+s.c:"1.5px solid "+s.bc,background:statusFilter===s.f?s.bg:T.card,display:"flex",flexDirection:"column",alignItems:"center",gap:1,boxShadow:statusFilter===s.f?"0 3px 10px "+s.c+"22":"0 1px 3px rgba(0,0,0,.05)",transition:"all .15s"}}>
          <span style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}</span>
          <span style={{fontSize:10,fontWeight:700,color:s.c}}>{s.l}</span>
        </button>)}
    </div>

    {/* OUTSTANDING */}
    <div style={{margin:isDesktop?"8px 24px":"8px 14px",padding:"12px 16px",borderRadius:12,background:T.card,border:"1.5px solid "+T.border}}>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <div><div style={{fontSize:9,color:T.textLight,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Total Outstanding</div><div style={{fontSize:18,fontWeight:900,color:T.text}}>{fmt(stats.totalOutstanding)}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:9,color:T.pink,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Uncalled Amount</div><div style={{fontSize:18,fontWeight:900,color:T.pink}}>{fmt(stats.flaggedOutstanding)}</div></div>
      </div>
      <div style={{marginTop:8,height:6,borderRadius:3,background:"#eceff1",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:"linear-gradient(90deg,"+T.green+","+T.teal+")",width:stats.totalOutstanding>0?Math.max(5,100-(stats.flaggedOutstanding/stats.totalOutstanding*100))+"%":"0%",transition:"width .5s"}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:9,color:T.textLight}}><span>Called</span><span>Uncalled</span></div>
    </div>

    {/* FILTERS */}
    <div style={{padding:isDesktop?"8px 24px":"8px 14px",display:"flex",flexDirection:"column",gap:8}}>
      <div style={{position:"relative"}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Ic type="search" size={14} color="#94a3b8"/></div>
        <input type="text" placeholder="Search client name..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} style={{width:"100%",boxSizing:"border-box",padding:"10px 14px 10px 34px",borderRadius:10,border:"1.5px solid "+T.border,background:T.card,color:T.text,fontSize:13,outline:"none"}}/>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
        {["ALL","PLATINUM","GOLD","SILVER"].map(cat=>{const cs={ALL:{a:T.teal,ib:"#eceff1",it:T.textLight},PLATINUM:{a:"#7b1fa2",ib:"#f3e5f5",it:"#7b1fa2"},GOLD:{a:T.orange,ib:T.yellowLight,it:T.orange},SILVER:{a:"#1565c0",ib:"#e3f2fd",it:"#1565c0"}};const s=cs[cat];const ac=categoryFilter===cat;
          return<button key={cat} onClick={()=>setCategoryFilter(cat)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:ac?s.a:s.ib,color:ac?"#fff":s.it,transition:"all .15s"}}>{cat}{cat!=="ALL"?" ("+( stats.catCounts[cat]||0)+")":""}</button>})}
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{marginLeft:"auto",padding:"5px 10px",borderRadius:8,border:"1.5px solid "+T.border,background:T.card,color:T.textLight,fontSize:11,fontWeight:600,cursor:"pointer"}}><option value="outstanding">Sort: Amount</option><option value="shortfall">Sort: Shortfall</option><option value="name">Sort: Name</option></select>
      </div>
    </div>

    <div style={{padding:"4px "+(isDesktop?"24px":"14px")+" 6px",fontSize:11,color:T.textLight,fontWeight:600}}>Showing {filtered.length} of {processedData.length} clients</div>

    {/* CARDS */}
    <div style={{padding:"0 "+(isDesktop?"24px":"14px")+" 40px",display:isDesktop?"grid":"flex",gridTemplateColumns:isDesktop?"1fr 1fr":undefined,flexDirection:isDesktop?undefined:"column",gap:8}}>
      {filtered.map((cl,idx)=>{const exp=expandedCard===idx;const wd=cl.weekData;const bc=cl.status==="no_calls"?T.pink:cl.status==="behind"?T.orange:T.green;
        return<div key={idx} className="card-enter" onClick={()=>setExpandedCard(exp?null:idx)} style={{background:T.card,border:"1.5px solid "+T.border,borderRadius:14,padding:"12px 14px",cursor:"pointer",transition:"all .2s",borderLeft:"4px solid "+bc,boxShadow:exp?"0 6px 20px rgba(0,0,0,.1)":"0 1px 4px rgba(0,0,0,.04)",alignSelf:"start"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cl.name}</div><div style={{display:"flex",gap:4,marginTop:5,flexWrap:"wrap"}}><CP category={cl.category}/><FP frequency={cl.frequency}/></div></div>
            <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:14,fontWeight:900,color:cl.outstanding>50000?T.pink:T.text}}>{fmt(cl.outstanding)}</div><div style={{marginTop:3}}><DP outstandingDays={cl.outstandingDays}/></div></div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
            <SB met={wd.met} shortfall={wd.shortfall} totalAttempts={wd.totalAttempts}/>
            <div style={{fontSize:12,color:T.textLight,fontWeight:600}}><span style={{color:T.green,fontWeight:800}}>{wd.yesCalls}</span><span style={{color:"#ccc"}}> / </span><span style={{fontWeight:800,color:T.text}}>{wd.required}</span>{wd.noCalls>0&&<span style={{color:T.pink,marginLeft:4,fontSize:10}}>({wd.noCalls} missed)</span>}</div>
          </div>
          {exp&&<div style={{marginTop:12,paddingTop:12,borderTop:"1.5px solid "+T.border}}>
            <div style={{fontSize:10,fontWeight:700,color:T.textLight,marginBottom:8,textTransform:"uppercase",letterSpacing:".1em"}}>{"Daily Call Log \u2014 "+week.full}</div>
            <DD client={cl} weekDays={week.days}/>
            <div style={{marginTop:10,display:"flex",gap:14,fontSize:10,color:T.textLight,fontWeight:600}}>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#c8e6c9",border:"1.5px solid "+T.green,marginRight:4,verticalAlign:"middle"}}/>Called</span>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#ffcdd2",border:"1.5px solid "+T.pink,marginRight:4,verticalAlign:"middle"}}/>Missed</span>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:"#f5f5f5",border:"1.5px solid #e0e0e0",marginRight:4,verticalAlign:"middle"}}/>No Data</span>
            </div>
            {wd.shortfall>0&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:T.pinkLight,border:"1.5px solid #f8bbd0",fontSize:12,color:"#c62828",fontWeight:600}}>{"\u26A0 Need "+wd.shortfall+" more call"+(wd.shortfall>1?"s":"")+" this week to meet "+cl.frequency.toLowerCase()+" target"}</div>}
          </div>}
        </div>})}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
