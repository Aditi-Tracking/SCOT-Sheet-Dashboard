<td style={{textAlign:"center"}}><span className="num" style={{fontSize:13}}><span style={{color:wa.att>=wa.req?"#16a34a":"#d97706"}}>{wa.att}</span><span style={{color:"#d4d4d8"}}>/</span>{wa.req}</span></td>
<td><SB met={wa.met} short={wa.short} att={wa.att} paid={cl.st==="paid"} otherStatus={cl.st==="other_status"} statusText={cl.sheetStatus}/></td>
<td>{cl.sheetStatus?<span className="pill" style={{background:cl.st==="paid"?"#dcfce7":cl.st==="other_status"?"#ede9fe":"#f3f4f6",color:cl.st==="paid"?"#166534":cl.st==="other_status"?"#6d28d9":"#6b7280",fontSize:10}}>{cl.sheetStatus}</span>:""}</td>
{wk.d.map(function(d){var v=cl.calls[d];var bg=v==="YES"?"#dcfce7":v==="NO"?"#fee2e2":SUN.indexOf(d)>=0?"#fafafa":"#fff";var co=v==="YES"?"#166534":v==="NO"?"#991b1b":"#e5e7eb";return <td key={d} style={{textAlign:"center",fontSize:13,fontWeight:700,color:co,background:bg,minWidth:28}}>{v==="YES"?"\u2713":v==="NO"?"\u2717":"\u2022"}</td>})}
</tr>})}</tbody></table></div>
{filtered.length===0&&<div style={{padding:50,textAlign:"center",color:"#9ca3af"}}><div style={{fontSize:40,marginBottom:8}}>{isSunday?"\u2600":"\uD83D\uDCCB"}</div><div style={{fontSize:15,fontWeight:600,color:"#6b7280"}}>{isSunday?"Sunday \u2014 No calls scheduled":loading?"Loading data from Google Sheets...":rawData.length===0?(connected?"No data for "+(isAdmin?(selPerson==="ALL"?"any member":selPerson):lockedPerson):"Connecting..."):"No clients match filters"}</div></div>}
</div>

</div>
</div>

{showPwdModal&&<ChangePasswordModal userKey={isAdmin?"admin":(lockedPerson?lockedPerson.toLowerCase():"admin")} userColor={lockedPersonObj?lockedPersonObj.color:"#667eea"} onClose={function(){setShowPwdModal(false)}}/>}
</React.Fragment>
}

/* ====== ROOT AUTH WRAPPER ====== */
function Root(){
var _authUser=useState(null);var authUser=_authUser[0],setAuthUser=_authUser[1];
var _ready=useState(false);var ready=_ready[0],setReady=_ready[1];

useEffect(function(){
fetchPasswords(function(){setReady(true)})
},[]);

if(!ready){
return <div className="login-wrap">
<div className="login-card" style={{textAlign:"center"}}>
<div className="login-logo">{"\uD83D\uDCCA"} Collection Calling Tracker</div>
<div className="login-sub">March 2026</div>
<div style={{margin:"40px 0"}}>
<div style={{width:40,height:40,border:"4px solid #e5e7eb",borderTopColor:"#667eea",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto"}}/>
<div style={{marginTop:16,color:"#6b7280",fontSize:13,fontWeight:600}}>Loading...</div>
</div>
</div>
</div>
}

if(!authUser){
return <LoginScreen onSuccess={function(userKey){setAuthUser(userKey)}}/>
}

var authCfg=AUTH[authUser];
var isAdmin=authUser==="admin";
var lockedPerson=authCfg.person||null;

return <App role={isAdmin?"admin":"member"} lockedPerson={lockedPerson} onLogout={function(){setAuthUser(null)}}/>
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script></body></html>
