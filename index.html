ans+=d.wdActive.yes;
una+=d.wdActive.no;
totalAttempts+=d.wdActive.att;
}
/* Outstanding: always total */
to+=Math.max(0,d.outstanding);
/* Category counts */
if(cc[d.category]!==undefined)cc[d.category]++;
});
/* Outstanding split: called vs uncalled in active scope */
var calledOut=0,uncalledOut=0;
processed.forEach(function(d){
var amt=Math.max(0,d.outstanding);
var wasCalled=selDay>0?(d.dayVal==="YES"||d.dayVal==="NO"):d.wdActive.att>0;
if(wasCalled)calledOut+=amt;else uncalledOut+=amt;
});
return{total:t,onTrack:on,behind:bh,noCalls:nc,ans:ans,una:una,to:to,calledOut:calledOut,uncalledOut:uncalledOut,totalAttempts:totalAttempts,cc:cc}
},[processed,selDay,isSunday]);

/* Convenience: totals from active scope */
var totCE=stats.ans;
var called=stats.totalAttempts;

/* ====== SCORES (Scorecard — fully date-aware) ====== */
var scores=useMemo(function(){
var scoreDays=selDay>0?[selDay]:wk.d;
var isSun=selDay>0&&SUN.indexOf(selDay)>=0;
return PERSONS.map(function(p){
var pd=(allData[p.name]||[]).map(function(c){
var norm=normClient(Object.assign({},c,{_person:p.name}));
var wd;
if(selDay>0){
var v=norm.calls[selDay];
var y=v==="YES"?1:0;var n=v==="NO"?1:0;var att=y+n;
wd={req:1,yes:y,no:n,att:att,met:y>=1,short:Math.max(0,1-y)};
}else{
wd=gWD(norm,scoreDays);
}
return Object.assign({},norm,{wd:wd});
});
var tot=pd.length,cal=0,ans=0,otr=0,ty=0,tno=0,tOut=0,calledOut=0;
pd.forEach(function(c){
var wasCalled=c.wd.att>0;
if(wasCalled)cal++;
ans+=c.wd.yes;
tno+=c.wd.no;
if(c.wd.met&&wasCalled)otr++;
ty+=c.wd.yes;
tOut+=Math.max(0,c.outstanding);
if(wasCalled)calledOut+=Math.max(0,c.outstanding);
});
/* Target for this scope */
var wd2=selDay>0?(isSun?0:1):scoreDays.filter(function(d){return SUN.indexOf(d)<0}).length;
var tg=p.tgt*wd2;
var cp=tg>0?Math.round(ty/tg*100):0;
var cv=tot>0?Math.round(cal/tot*100):0;
var cm=tot>0?Math.round(otr/tot*100):0;
var sc=tg>0?Math.min(100,Math.round(ty/tg*100)):0;
var fl=[];
if(isSun){fl.push("Sunday - no target")}
else{
if(sc<25)fl.push("Critical - below 25%");
else if(sc<50)fl.push("Below 50% target");
if(cv<40)fl.push("Many uncalled clients");
}
return{name:p.name,color:p.color,tgt:p.tgt,tot:tot,cal:cal,ans:ans,otr:otr,
cp:cp,cv:cv,cm:cm,sc:sc,fl:fl,tg:tg,tOut:tOut,calledOut:calledOut}
})
},[allData,selWeek,selDay]);
